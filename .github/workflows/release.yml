name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare zip
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          ZIP_NAME="x-like-extension-${TAG_NAME}.zip"
          rm -f "${ZIP_NAME}"
          zip -r "${ZIP_NAME}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "**/.DS_Store"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
